# Goal: InEKF 하이퍼파라미터와 noise 설정을 benchmark 형식으로 관리한다.
# What it does: initialization, invariant motion/measurement noise, evaluation 설정을 정의한다.
filter:
  name: inekf

initialization:
  mean: [0.0, 0.0, 0.0]
  cov_diag: [1.0, 1.0, 0.3]

motion_model:
  process_noise_diag: [0.02, 0.02, 0.005]
  linear_input_type: velocity # options: velocity, acceleration
  gravity: [0.0, 0.0, -9.81]

measurement_model:
  position_indices: [0, 1]
  measurement_noise_diag: [0.7, 0.7]

evaluation:
  enabled: true
  position_indices: [0, 1]
  yaw_index: 2

output:
  dir: outputs
  timestamped_subdir: true
