# Particle Filter settings.
filter:
  name: pf

num_particles: 3000
resample_threshold_ratio: 0.5
seed: 7

initialization:
  mean: [0.0, 0.0, 0.0]
  cov_diag: [1.0, 1.0, 0.3]

motion_model:
  x_index: 0
  y_index: 1
  process_noise_diag: [0.02, 0.02, 0.005]

measurement_model:
  position_indices: [0, 1]
  measurement_noise_diag: [0.7, 0.7]
  likelihood_model: gaussian_mixture # options: gaussian, gaussian_mixture
  outlier_weight: 0.05
  outlier_noise_diag: [4.0, 4.0]

evaluation:
  enabled: true
  position_indices: [0, 1]
  yaw_index: 2

output:
  dir: outputs
  timestamped_subdir: true
