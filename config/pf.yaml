# Particle Filter settings.
filter:
  name: pf

num_particles: 3000
resample_threshold_ratio: 0.5
seed: 7

initialization:
  mean: [0.0, 0.0, 0.0]
  cov_diag: [1.0, 1.0, 0.3]

motion_model:
  x_index: 0
  y_index: 1
  process_noise_diag: [0.02, 0.02, 0.005]

measurement_model:
  position_indices: [0, 1]
  measurement_noise_diag: [0.7, 0.7]

evaluation:
  enabled: true
  position_indices: [0, 1]
  yaw_index: 2

visualization:
  enabled: true
  position_indices: [0, 1]
  downsample: 20
  elev: 24
  azim: 38
  show_projections: true
  save_animation: true
  animation:
    format: mp4
    fps: 500
    tail_length: 10

output:
  dir: outputs
  timestamped_subdir: true
