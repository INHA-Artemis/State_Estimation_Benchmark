# [협업 주석]
# Goal: Particle Filter 하이퍼파라미터와 model noise 설정을 선언적으로 관리한다.
# What it does: particle 수, resampling 기준, initialization, motion/measurement noise,
# evaluation/visualization/output 옵션을 정의한다.
filter:
  name: pf # future-ready: pf, ekf, inekf

num_particles: 500
resample_threshold_ratio: 0.5
seed: 7

initialization:
  # If pose_type=6d, set these to length 6 or rely on run-time defaults.
  mean: [0.0, 0.0, 0.0]
  cov_diag: [1.0, 1.0, 0.3]

motion_model:
  # state indices used by planar propagation
  x_index: 0
  y_index: 1
  process_noise_diag: [0.02, 0.02, 0.005]

measurement_model:
  # GPS measures x,y
  position_indices: [0, 1]
  measurement_noise_diag: [0.7, 0.7]

evaluation:
  enabled: true
  position_indices: [0, 1]
  yaw_index: 2

visualization:
  enabled: true
  position_indices: [0, 1]
  save_animation: true
  animation:
    format: gif # gif or mp4
    fps: 20
    tail_length: 80

output:
  dir: outputs
  timestamped_subdir: true
