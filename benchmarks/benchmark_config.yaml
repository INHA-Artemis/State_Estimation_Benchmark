num_trials: 100
dataset_seed_start: 2
sync_pf_seed_with_dataset_seed: true

ekf_cases:
  - name: ekf_default

  - name: ekf_low_process_noise
    motion_model:
      process_noise_diag: [0.01, 0.01, 0.003]

pf_cases:
  - name: gaussian_baseline
    num_particles: 3000
    resample_threshold_ratio: 0.5
    resampling_method: systematic
    measurement_model:
      likelihood_model: gaussian
      outlier_weight: 0.05
      outlier_noise_diag: [4.0, 4.0]

  - name: gaussian_mixture_default
    num_particles: 3000
    resample_threshold_ratio: 0.5
    resampling_method: systematic
    measurement_model:
      likelihood_model: gaussian_mixture
      outlier_weight: 0.05
      outlier_noise_diag: [4.0, 4.0]

ukf_cases:
  - name: default_sigma_points
    sigma_points:
      alpha: 0.3
      beta: 2.0
      kappa: 0.0

inekf_cases:
  - name: velocity_gravity_default
    motion_model:
      linear_input_type: velocity
      gravity: [0.0, 0.0, -9.81]
