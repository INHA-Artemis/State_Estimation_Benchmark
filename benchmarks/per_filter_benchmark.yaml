ukf_cases:
  - name: ukf_default_config_noise
    filter_overrides:
      initialization:
        cov_diag: [1.0, 1.0, 0.3]
      motion_model:
        process_noise_diag: [0.02, 0.02, 0.005]
      measurement_model:
        measurement_noise_diag: [0.7, 0.7]
      sigma_points:
        alpha: 0.3
        beta: 2.0
        kappa: 0.0

  - name: ukf_dataset_noise_default_sigma
    filter_overrides:
      initialization:
        cov_diag: [1.0, 1.0, 0.3]
      motion_model:
        process_noise_diag: [0.02, 0.02, 0.005]
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]
      sigma_points:
        alpha: 0.3
        beta: 2.0
        kappa: 0.0

  - name: ukf_low_process_noise
