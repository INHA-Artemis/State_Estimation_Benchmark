filter: inekf
num_trials: 100
dataset_seed_start: 10
sync_filter_seed_with_dataset_seed: true
output_dir: outputs/benchmarks/per_filter

dataset_cases:
  - name: synthetic_2d_gaussian
    dataset_overrides:
      dataset_type: synthetic
      dataset_name: synthetic_2d_gaussian
      pose_type: 2d
      mode: fused
      gnss_noise_std: [0.05, 0.05, 0.05]
      gnss_noise_model: gaussian

  - name: synthetic_2d_outlier
    dataset_overrides:
      dataset_type: synthetic
      dataset_name: synthetic_2d_outlier
      pose_type: 2d
      mode: fused
      gnss_noise_std: [0.05, 0.05, 0.05]
      gnss_noise_model: outlier_mixture
      gnss_outlier_prob: 0.1
      gnss_outlier_std: [2.0, 2.0, 2.0]

pf_cases:
  - name: pf_1000_gaussian
    filter_overrides:
      num_particles: 1000
      resample_threshold_ratio: 0.5
      resampling_method: systematic
      measurement_model:
        likelihood_model: gaussian
        outlier_weight: 0.05
        outlier_noise_diag: [4.0, 4.0]

  - name: pf_3000_gmm
    filter_overrides:
      num_particles: 3000
      resample_threshold_ratio: 0.5
      resampling_method: systematic
      measurement_model:
        likelihood_model: gaussian_mixture
        outlier_weight: 0.05
        outlier_noise_diag: [4.0, 4.0]

ukf_cases:
  - name: ukf_default
    filter_overrides:
      sigma_points:
        alpha: 0.3
        beta: 2.0
        kappa: 0.0
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]

  - name: ukf_high_alpha
    filter_overrides:
      sigma_points:
        alpha: 0.7
        beta: 2.0
        kappa: 0.0
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]

ekf_cases:
  - name: ekf_default
    filter_overrides:
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]
      motion_model:
        process_noise_diag: [0.02, 0.02, 0.005]

  - name: ekf_low_process_noise
    filter_overrides:
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]
      motion_model:
        process_noise_diag: [0.01, 0.01, 0.003]

inekf_cases:
  - name: inekf_default
    filter_overrides:
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]
      motion_model:
        process_noise_diag: [0.02, 0.02, 0.005]

  - name: inekf_low_process_noise
    filter_overrides:
      measurement_model:
        measurement_noise_diag: [0.05, 0.05]
      motion_model:
        process_noise_diag: [0.01, 0.01, 0.003]

# Backward-compatible fallback. Used only when <filter>_cases is absent.
filter_cases: []
